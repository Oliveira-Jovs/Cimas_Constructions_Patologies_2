{% extends 'base.html' %}

{% block contents %}
<div class="input-container">
    <label class="custum-file-upload" for="file">
        <div class="icon">
            <!-- Ícone (o mesmo que já estava) -->
        </div>
        <div class="text">
            <span>Clique para fazer Upload</span>

{% endblock %}
